<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile — LockdIN</title>
    <meta name="description" content="Manage your LockdIN profile, buddy, and friends.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/profile.css">
</head>

<body>
    <div class="page-loading" id="loadingScreen">
        <div class="page-loading-spinner"></div>
    </div>
    <div class="page-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- Nav -->
    <nav class="dash-navbar">
        <a href="/dashboard.html" class="dash-logo">
            <span class="logo-lock">Lockd</span><span class="logo-in">IN</span>
        </a>
        <div class="dash-nav-links">
            <a href="/dashboard.html">Dashboard</a>
            <a href="/leaderboard.html">Leaderboard</a>
            <a href="/history.html">History</a>
            <a href="/profile.html" class="active">Profile</a>
        </div>
        <div class="dash-nav-right">
            <div class="dash-user-avatar-placeholder" id="navAvatar">?</div>
        </div>
    </nav>

    <main class="prof-main">
        <div class="prof-header">
            <h1>Your Profile</h1>
        </div>

        <!-- User Info Card -->
        <div class="prof-card prof-user-card">
            <div class="prof-user-row">
                <div class="prof-big-avatar" id="profAvatar">?</div>
                <div class="prof-user-info">
                    <h2 id="profName">User</h2>
                    <p class="prof-email" id="profEmail">email@example.com</p>
                </div>
            </div>
            <div class="prof-invite-row">
                <span class="prof-invite-label">Your Invite Code</span>
                <div class="prof-invite-code-wrap">
                    <code class="prof-invite-code" id="profInviteCode">—</code>
                    <button class="prof-copy-btn" id="copyInviteBtn" title="Copy to clipboard">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Buddy Card -->
        <div class="prof-card prof-buddy-card">
            <div class="card-header">
                <span class="card-title">Your Buddy</span>
            </div>
            <div class="prof-buddy-display">
                <img class="prof-buddy-img" id="profBuddyImg" style="display:none" alt="Buddy">
                <div class="buddy-emoji-fallback" id="profBuddyEmojiFallback" style="display:none"></div>
                <div class="prof-buddy-info">
                    <h3 id="profBuddyName">Buddy</h3>
                    <p class="prof-buddy-mood" id="profBuddyMood"></p>
                    <p class="prof-buddy-streak" id="profBuddyStreak"></p>
                </div>
            </div>
            <!-- Mood Gallery -->
            <div class="prof-mood-gallery" id="profMoodGallery">
                <!-- 10 mood thumbnails rendered by JS -->
            </div>
        </div>

        <!-- Friends Card -->
        <div class="prof-card prof-friends-card">
            <div class="card-header">
                <span class="card-title">Friends</span>
                <span class="friend-count" id="friendCount">0</span>
            </div>
            <div class="prof-friends-list" id="profFriendsList">
                <p class="prof-empty">No friends added yet. Share your invite code!</p>
            </div>

            <!-- Pending Requests -->
            <div class="prof-pending" id="profPending" style="display:none">
                <h4 class="prof-pending-title">Pending Requests</h4>
                <div class="prof-pending-list" id="profPendingList"></div>
            </div>
        </div>

        <!-- Danger Zone -->
        <div class="prof-card prof-danger-card">
            <button class="prof-signout-btn" id="signOutBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Sign Out
            </button>
        </div>
    </main>

    <div class="page-error-toast" id="errorToast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js?v=4"></script>
    <script src="js/api.js?v=4"></script>
    <script src="js/profile.js?v=5"></script>
</body>

</html>
