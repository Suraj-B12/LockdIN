<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — LockdIN</title>
    <meta name="description" content="Sign in to LockdIN with your Google account to start tracking your productivity.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <!-- Background Effects -->
    <div class="login-bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- Login Card -->
    <div class="login-container">
        <div class="login-card" id="loginCard">
            <!-- Logo -->
            <div class="login-logo">
                <span class="logo-lock">Lockd</span><span class="logo-in">IN</span>
            </div>
            <p class="login-tagline">
                Track your focused hours. Compete with friends.<br>
                Sign in to pick up where you left off.
            </p>

            <!-- Sign In Content -->
            <div id="loginContent">
                <!-- Google Sign In Button -->
                <button class="btn-google" id="googleSignInBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"
                            fill="#4285F4" />
                        <path
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                            fill="#34A853" />
                        <path
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                            fill="#FBBC05" />
                        <path
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                            fill="#EA4335" />
                    </svg>
                    <span class="btn-text">Continue with Google</span>
                </button>

                <!-- Error Message -->
                <div class="login-error" id="loginError"></div>
            </div>

            <!-- Success State (hidden by default) -->
            <div class="login-success" id="loginSuccess">
                <div class="check-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>
                <p>Signed in! Redirecting to your dashboard...</p>
            </div>

            <!-- Footer -->
            <div class="login-footer">
                <a href="/">← Back to home</a>
            </div>
        </div>
    </div>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js?v=2"></script>
    <script src="js/login.js?v=2"></script>
</body>

</html>
