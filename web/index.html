<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="mask-icon" href="/mask-icon.svg" color="#00B8A9" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="color-scheme" content="dark" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LockdIN" />

    <title>LockdIN — accountability that actually works</title>
    <meta
      name="description"
      content="Track focused time, get honest productivity scores, and hold each other accountable with friends. Built for students who mean business."
    />

    <!-- Open Graph / social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="LockdIN — lock in, level up" />
    <meta
      property="og:description"
      content="Track your focused hours, log what you did, get an honest score, and compete with friends."
    />
    <meta property="og:image" content="/icons/icon-512.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LockdIN — lock in, level up" />
    <meta
      name="twitter:description"
      content="Accountability you can actually see. Focus sessions, AI scores, streaks, and friend leaderboards."
    />
    <!-- Pre-React boot splash: shown instantly (before the JS bundle + React
         mount) so a cold load never flashes a blank page. React replaces #root's
         contents on mount, removing it automatically. -->
    <style>
      @keyframes lockdin-bootspin { to { transform: rotate(360deg); } }
      #lockdin-boot {
        position: fixed; inset: 0; display: grid; place-items: center;
        background: #0a0a0f;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      #lockdin-boot .wm { font-weight: 700; font-size: 24px; letter-spacing: -0.04em; color: #f0f0f5; }
      #lockdin-boot .wm i { color: #00b8a9; font-style: normal; }
      #lockdin-boot .sp {
        margin-top: 20px; width: 32px; height: 32px; border-radius: 9999px;
        border: 3px solid rgba(255,255,255,0.12); border-top-color: #00d4c3;
        animation: lockdin-bootspin 0.7s linear infinite;
      }
      @media (prefers-reduced-motion: reduce) { #lockdin-boot .sp { animation-duration: 1.5s; } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="lockdin-boot">
        <div style="display:flex;flex-direction:column;align-items:center">
          <div class="wm">Lockd<i>IN</i></div>
          <div class="sp"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
